services:
  - type: web
    name: arithmetic-grader-backend
    runtime: python
    rootDir: backend
    packages:
      - tesseract-ocr
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
